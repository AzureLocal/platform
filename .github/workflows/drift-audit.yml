# standards. Implementation lands in Phase 4 — this stub exists so the
# schedule and entry point are declared from day one.

on:
  schedule:
    # 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
