site_name: {{REPO_NAME}}
site_description: {{DESCRIPTION}}
site_url: https://azurelocal.github.io/{{REPO_NAME}}/
repo_url: https://github.com/AzureLocal/{{REPO_NAME}}
repo_name: AzureLocal/{{REPO_NAME}}

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
    - scheme: slate
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Prerequisites: prerequisites.md
  - Migration:
      - Overview: migration/index.md
      - Phase 1 — Assessment: migration/phase-1-assessment.md
      - Phase 2 — Preparation: migration/phase-2-preparation.md
      - Phase 3 — Migration: migration/phase-3-migration.md
      - Phase 4 — Validation: migration/phase-4-validation.md
  - Rollback: rollback.md
  - Reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

copyright: >-
  Copyright &copy; {{YEAR}} AzureLocal.
