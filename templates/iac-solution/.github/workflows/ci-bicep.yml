name: CI — Bicep Validate

on:
  pull_request:
    paths:
      - 'src/bicep/**'
  push:
    branches: [main]
    paths:
      - 'src/bicep/**'

jobs:
  iac:
    uses: AzureLocal/platform/.github/workflows/reusable-iac-validate.yml@main
    with:
      run-bicep: true
      run-terraform: false
      bicep-path: src/bicep
