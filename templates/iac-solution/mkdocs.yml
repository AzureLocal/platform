site_name: {{REPO_NAME}}
site_description: {{DESCRIPTION}}
site_url: https://azurelocal.github.io/{{REPO_NAME}}/
repo_url: https://github.com/AzureLocal/{{REPO_NAME}}
repo_name: AzureLocal/{{REPO_NAME}}

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Deployment:
      - Overview: deployment/index.md
  - Reference:
      - Variables: reference/variables.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search

copyright: >-
  Copyright &copy; {{YEAR}} AzureLocal.
