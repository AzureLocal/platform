site_name: {{MODULE_NAME}}
site_description: {{DESCRIPTION}}
site_url: https://azurelocal.github.io/{{REPO_NAME}}/
repo_url: https://github.com/AzureLocal/{{REPO_NAME}}
repo_name: AzureLocal/{{REPO_NAME}}

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/{{REPO_NAME}}
      name: GitHub Repository
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; {{YEAR}} AzureLocal.
